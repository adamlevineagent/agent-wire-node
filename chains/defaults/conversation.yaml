# Conversation Pipeline Chain Definition v3.0.0
#
# Forward/reverse/combine is the compression pattern for sequential content.
# After L0 combine, batched semantic thread clustering groups topics by
# subject across chunks. LLM-driven convergence with apex_ready signal.
#
# Pipeline:
#   1. Forward pass (sequential, context-accumulating)
#   2. Reverse pass (sequential, backward annotation)
#   3. Combine → L0 nodes (fuse forward + reverse)
#   4. Batched thread clustering (field-projected, token-aware)
#   5. Thread synthesis → L1 nodes (per-thread, temporally-ordered)
#   6. L1 cross-layer webbing
#   7. Upper layers (recursive clustering → apex, with apex_ready)
#   8. L2 cross-layer webbing
#
# All intelligence in YAML and prompts. Rust is a dumb execution engine.

schema_version: 1
id: conversation-default
name: Conversation Pyramid
description: >
  Conversation analysis with forward/reverse compression, batched semantic
  thread clustering with field projection, temporally-ordered synthesis,
  and LLM-driven convergence to apex. All decisions in YAML.
content_type: conversation
version: "3.0.0"
author: agent-wire

defaults:
  model_tier: mid
  temperature: 0.3
  on_error: "retry(2)"

steps:
  # ── Step 1: Forward pass ────────────────────────────────────────────
  - name: forward_pass
    primitive: compress
    instruction: "$prompts/conversation/forward.md"
    for_each: $chunks
    sequential: true
    accumulate:
      field: running_context
      init: "Beginning of conversation."
      max_chars: 1500
      trim_to: 1200
      trim_side: start
    input:
      user_template: "## RUNNING CONTEXT FROM PRIOR CHUNKS\n{running_context}\n\n## CHUNK {chunk_index}\n{chunk_content}"
    save_as: step_only
    depth: -1

  # ── Step 2: Reverse pass ────────────────────────────────────────────
  - name: reverse_pass
    primitive: compress
    instruction: "$prompts/conversation/reverse.md"
    for_each: $chunks_reversed
    sequential: true
    accumulate:
      field: running_context
      init: "End of conversation."
      max_chars: 1500
      trim_to: 1200
      trim_side: end
    input:
      user_template: "## RUNNING CONTEXT FROM FUTURE CHUNKS\n{running_context}\n\n## CHUNK {chunk_index}\n{chunk_content}"
    save_as: step_only
    depth: -1

  # ── Step 3: Combine forward + reverse → L0 nodes ───────────────────
  - name: combine_l0
    primitive: fuse
    instruction: "$prompts/conversation/combine.md"
    for_each: $chunks
    # Conversation chunks are pre-split at ingest, but safety net for oversized ones
    max_input_tokens: 80000
    split_strategy: "lines"
    split_overlap_tokens: 300
    split_merge: true
    split_merge_instruction: "$prompts/shared/merge_sub_chunks.md"
    input:
      zip_steps:
        - forward_pass
        - step: reverse_pass
          reverse: true
    save_as: node
    node_id_pattern: "L0-{index:03}"
    depth: 0

  # ── Step 4: Thread clustering ───────────────────────────────────────
  # Groups ALL L0 topics by SUBJECT across chunks. Batched with field
  # projection for large conversations.
  - name: thread_clustering
    primitive: classify
    instruction: "$prompts/conversation/conv_cluster.md"
    input:
      topics: $combine_l0
    item_fields: ["node_id", "headline", "orientation"]
    batch_size: 150
    batch_max_tokens: 80000
    response_schema:
      type: object
      properties:
        threads:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              name:
                type: string
                description: "2-6 word thread label"
              description:
                type: string
              assignments:
                type: array
                minItems: 1
                items:
                  type: object
                  properties:
                    source_node:
                      type: string
                      description: "Exact L0-XXX node ID"
                    topic_index:
                      type: integer
                    topic_name:
                      type: string
                  required: ["source_node", "topic_index", "topic_name"]
                  additionalProperties: false
            required: ["name", "description", "assignments"]
            additionalProperties: false
      required: ["threads"]
      additionalProperties: false
    model_tier: mid
    temperature: 0.3
    on_error: "retry(3)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"

  # ── Step 5: Thread synthesis → L1 nodes ─────────────────────────────
  - name: thread_narrative
    primitive: synthesize
    instruction: "$prompts/conversation/conv_thread.md"
    for_each: $thread_clustering.threads
    node_id_pattern: "L1-{index:03}"
    depth: 1
    save_as: node
    concurrency: 5
    model_tier: mid
    temperature: 0.3
    on_error: "retry(2)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"

  # ── Step 6: L1 cross-layer webbing ──────────────────────────────────
  - name: l1_webbing
    primitive: web
    instruction: "$prompts/conversation/conv_web.md"
    input:
      nodes: $thread_narrative
    response_schema:
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 1
    save_as: web_edges
    model_tier: mid
    temperature: 0.2
    on_error: "skip"

  # ── Step 7: Upper layers (loop: recluster → apex check → synthesize) ──
  - name: upper_layers
    primitive: loop
    until: "count($current_nodes) <= 1"
    depth: 1
    save_as: node
    node_id_pattern: "L{depth}-{index:03}"
    steps:
      - name: recluster
        primitive: classify
        instruction: "$prompts/conversation/conv_recluster.md"
        input:
          nodes: $current_nodes
        item_fields: ["node_id", "headline", "orientation"]
        response_schema:
          type: object
          properties:
            apex_ready:
              type: boolean
              description: "true if nodes are the natural top-level knowledge domains"
            clusters:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  description:
                    type: string
                  node_ids:
                    type: array
                    items:
                      type: string
                required: ["name", "description", "node_ids"]
                additionalProperties: false
          required: ["apex_ready", "clusters"]
          additionalProperties: false
        model_tier: mid
        temperature: 0.3
        on_error: "retry(3)"
        on_parse_error: "heal"
        heal_instruction: "$prompts/shared/heal_json.md"
      - name: check_apex
        primitive: gate
        when: "$recluster.apex_ready == true"
        break: true
      - name: synthesize_layer
        primitive: synthesize
        instruction: "$prompts/conversation/conv_distill.md"
        for_each: $recluster.clusters
        concurrency: 5
        save_as: node
        node_id_pattern: "L{depth}-{index:03}"
        model_tier: mid
        temperature: 0.3
        on_error: "retry(3)"
        on_parse_error: "heal"
        heal_instruction: "$prompts/shared/heal_json.md"

  # ── Step 8: L2 cross-layer webbing ──────────────────────────────────
  - name: l2_webbing
    primitive: web
    instruction: "$prompts/conversation/conv_web.md"
    response_schema:
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 2
    save_as: web_edges
    model_tier: mid
    temperature: 0.2
    on_error: "skip"

post_build: []
