# ⚠ DEPRECATED — DO NOT USE FOR NEW BUILDS ⚠
#
# As of 2026-04-07 the Wire Node uses `question.yaml` as the canonical
# build pipeline for ALL content types. The default chain router
# (chain_registry::default_chain_id) returns `question-pipeline`
# regardless of content type. This file is retained for explicit
# opt-in via pyramid_chain_assignments and for parity tests.
#
# DO NOT add new builds to this chain. DO NOT update its prompts.
# Improve question.yaml instead.
#
# ────────────────────────────────────────────────────────────────────
schema_version: 1
id: conversation-default
name: Conversation Pipeline (LEGACY)
description: "DEPRECATED. Question-driven conversation analysis. Temporal-aware L0 extraction → web → decompose → evidence → gaps."
content_type: conversation
version: "1.0.0"
author: "wire-node"

defaults:
  model_tier: synth_heavy
  temperature: 0.3
  on_error: "retry(2)"

steps:
  # ── Phase 0: Load prior state ───────────────────────────────────────
  - name: load_prior_state
    primitive: cross_build_input
    save_as: step_only

  # ── Phase 1: Conversation L0 extraction ─────────────────────────────
  # Conversation-tuned: preserves speaker attribution, temporal markers,
  # decision points, and back-references. Parallel extraction — the
  # question tree + evidence loop provides organizational structure.
  - name: source_extract
    primitive: extract
    instruction: "$prompts/conversation/source_extract_v2.md"
    for_each: "$chunks"
    when: "$load_prior_state.l0_count == 0"
    dispatch_order: "largest_first"
    concurrency: 10
    node_id_pattern: "Q-L0-{index:03}"
    depth: 0
    save_as: node
    max_input_tokens: 80000
    split_strategy: "sections"
    split_overlap_tokens: 500
    split_merge: true
    merge_instruction: "$prompts/shared/merge_sub_chunks.md"
    on_error: "retry(3)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"
    model_tier: extractor

  # ── Phase 2: L0 webbing ────────────────────────────────────────────
  # Conceptual + temporal/causal edges between conversation chunks.
  # Temporal edges (resolves:, supersedes:, enables:) map the
  # chronological backbone before question decomposition.
  - name: l0_webbing
    primitive: web
    instruction: "$prompts/question/question_web.md"
    input:
      nodes: "$source_extract"
    max_input_tokens: 80000
    batch_size: 50
    concurrency: 4
    dehydrate:
      - drop: orientation
      - drop: topics
      - drop: entities
    compact_inputs: true
    response_schema: &web_schema
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 0
    save_as: web_edges
    model_tier: web
    temperature: 0.2
    on_error: "skip"
    when: "$load_prior_state.l0_count == 0"

  # ── Phase 3: Refresh state after extraction ─────────────────────────
  - name: refresh_state
    primitive: cross_build_input
    save_as: step_only

  # ── Phase 4: Question-driven decomposition ──────────────────────────
  # Default apex question for conversations: "What happened, what was
  # discussed, what was decided, and in what order?" — set by the
  # routing layer, overridable by user.

  - name: enhance_question
    primitive: extract
    instruction: "$prompts/question/enhance_question.md"
    input:
      apex_question: "$apex_question"
      corpus_context: "$refresh_state.l0_summary"
      characterization: "$characterize"
    max_input_tokens: 80000
    save_as: step_only

  - name: decompose
    primitive: recursive_decompose
    instruction: "$prompts/question/decompose.md"
    when: "$load_prior_state.has_overlay == false"
    input:
      apex_question: "$apex_question"
      granularity: "$granularity"
      max_depth: "$max_depth"
      characterize: "$characterize"
      audience: "$audience"
      l0_summary: "$refresh_state.l0_summary"
    max_input_tokens: 80000
    save_as: step_only

  - name: decompose_delta
    primitive: recursive_decompose
    mode: delta
    instruction: "$prompts/question/decompose_delta.md"
    when: "$load_prior_state.has_overlay == true"
    input:
      apex_question: "$apex_question"
      granularity: "$granularity"
      max_depth: "$max_depth"
      characterize: "$characterize"
      audience: "$audience"
      existing_tree: "$load_prior_state.question_tree"
      existing_answers: "$load_prior_state.overlay_answers"
      evidence_sets: "$load_prior_state.evidence_sets"
      gaps: "$load_prior_state.unresolved_gaps"
      l0_summary: "$refresh_state.l0_summary"
    max_input_tokens: 80000
    dehydrate:
      - drop: evidence_sets
      - drop: gaps
      - drop: existing_answers
    save_as: step_only

  - name: extraction_schema
    primitive: extract
    instruction: "$prompts/question/extraction_schema.md"
    input:
      question_tree: "$decomposed_tree"
      characterize: "$characterize"
      audience: "$audience"
    max_input_tokens: 80000
    save_as: step_only

  # ── Phase 5: Evidence answering ─────────────────────────────────────
  - name: evidence_loop
    primitive: evidence_loop
    input:
      question_tree: "$decomposed_tree"
      extraction_schema: "$extraction_schema"
      load_prior_state: "$refresh_state"
      reused_question_ids: "$reused_question_ids"
      build_id: "$build_id"
    save_as: step_only

  - name: gap_processing
    primitive: process_gaps
    input:
      evidence_loop: "$evidence_loop"
      load_prior_state: "$refresh_state"
    save_as: step_only

  # ── Phase 6: Cross-cutting webbing ──────────────────────────────────
  - name: l1_webbing
    primitive: web
    instruction: "$prompts/question/question_web.md"
    max_input_tokens: 80000
    batch_size: 50
    concurrency: 4
    dehydrate:
      - drop: orientation
      - drop: topics
      - drop: entities
    compact_inputs: true
    response_schema: *web_schema
    depth: 1
    save_as: web_edges
    model_tier: web
    temperature: 0.2
    on_error: "skip"

  - name: l2_webbing
    primitive: web
    instruction: "$prompts/question/question_web.md"
    max_input_tokens: 80000
    batch_size: 50
    concurrency: 4
    dehydrate:
      - drop: orientation
      - drop: topics
      - drop: entities
    compact_inputs: true
    response_schema: *web_schema
    depth: 2
    save_as: web_edges
    model_tier: web
    temperature: 0.2
    on_error: "skip"

post_build: []
