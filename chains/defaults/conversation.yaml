# Conversation pipeline chain definition
# Exact sequencing from build_conversation() in build.rs
#
# Pipeline: forward → reverse → combine → L1 pairing → thread clustering →
#           thread narratives → upper layers (recursive pair to apex)

schema_version: 1
id: "conversation-default"
name: "Conversation (Default)"
description: "Standard conversation pyramid build pipeline — forward/reverse distillation, L0 combine, L1 positional pairing, L2 thread clustering + narratives, L3+ recursive pairing to apex."
content_type: "conversation"
version: "1.0.0"
author: "wire-default"

defaults:
  model_tier: "mid"
  temperature: 0.3
  on_error: "retry(2)"

steps:
  # ── Phase 1: Forward pass ──────────────────────────────────────────────
  # forEach chunks (0..N), sequential with running_context accumulation.
  # Saves step output only (no node). Step type: "forward".
  # Input: running_context from prior chunks + raw chunk content.
  # running_context init: "Beginning of conversation."
  # running_context from field: "running_context"
  # running_context accumulation: append with space, trim to 1200 chars from START when >1500.
  - name: "forward_pass"
    primitive: "compress"
    instruction: "$prompts/conversation/forward.md"
    for_each: "chunks"
    sequential: true
    accumulate:
      field: "running_context"
      init: "Beginning of conversation."
      max_chars: 1500
      trim_to: 1200
      trim_side: "start"
    input:
      user_template: "## RUNNING CONTEXT FROM PRIOR CHUNKS\n{running_context}\n\n## CHUNK {chunk_index}\n{chunk_content}"
    save_as: "step_only"
    depth: -1

  # ── Phase 2: Reverse pass ──────────────────────────────────────────────
  # forEach chunks_reversed (N-1..0), sequential with running_context accumulation.
  # Saves step output only (no node). Step type: "reverse".
  # Input: running_context from future chunks + raw chunk content.
  # running_context init: "End of conversation."
  # running_context from field: "running_context"
  # running_context accumulation: prepend with space, trim to 1200 chars from END when >1500.
  - name: "reverse_pass"
    primitive: "compress"
    instruction: "$prompts/conversation/reverse.md"
    for_each: "chunks_reversed"
    sequential: true
    accumulate:
      field: "running_context"
      init: "End of conversation."
      max_chars: 1500
      trim_to: 1200
      trim_side: "end"
    input:
      user_template: "## RUNNING CONTEXT FROM FUTURE CHUNKS\n{running_context}\n\n## CHUNK {chunk_index}\n{chunk_content}"
    save_as: "step_only"
    depth: -1

  # ── Phase 3: Combine forward + reverse → L0 nodes ─────────────────────
  # forEach chunks (0..N), zips forward[i] + reverse[i] step outputs.
  # Saves both step ("combine") and node. Node ID: "L0-{index:03}".
  # Input: pretty-printed forward JSON as "STONE", reverse JSON as "WATER".
  # Node depth: 0. chunk_index set. No children.
  - name: "combine_l0"
    primitive: "fuse"
    instruction: "$prompts/conversation/combine.md"
    for_each: "chunks"
    input:
      user_template: "## FORWARD (STONE)\n{forward_output_pretty}\n\n## REVERSE (WATER)\n{reverse_output_pretty}\n\nCombine into L0."
      zip_steps:
        - "forward_pass"
        - "reverse_pass"
    save_as: "node"
    node_id_pattern: "L0-{index:03}"
    depth: 0

  # ── Phase 4: L1 positional pairing ────────────────────────────────────
  # pair_adjacent L0 nodes into L1 nodes using DISTILL_PROMPT.
  # Step type: "synth". Node ID: "L1-{index:03}".
  # Input: left child as "SIBLING A (earlier)", right child as "SIBLING B (later)".
  # Each child rendered via child_payload_json (headline + distilled + topics).
  # On LLM failure: carry left node up (carry_left).
  # Odd trailing node: carry up unchanged.
  # Saves node with topics_json. Updates parent_id on children.
  - name: "l1_pairing"
    primitive: "synthesize"
    instruction: "$prompts/conversation/distill.md"
    pair_adjacent: true
    input:
      source_depth: 0
      user_template: "## SIBLING A (earlier)\n{left_payload_pretty}\n\n## SIBLING B (later)\n{right_payload_pretty}"
    save_as: "node"
    node_id_pattern: "L1-{index:03}"
    depth: 1
    on_error: "carry_left"

  # ── Phase 5: Thread clustering ─────────────────────────────────────────
  # Single LLM call (or batched if est_tokens > 30k) to classify L1 topics
  # into 6-12 threads. Step type: "thread_cluster".
  # Input: flat JSON array of {source_node, topic_index, name, entities (top 6)}.
  # If batched: each batch gets THREAD_CLUSTER_PROMPT, then results merged
  # with MERGE_PROMPT into unified 8-15 threads.
  # Saves step output only (no node).
  # Orphaned L1 nodes get added to an "Other" catch-all thread.
  - name: "thread_clustering"
    primitive: "classify"
    instruction: "$prompts/conversation/thread_cluster.md"
    batch_threshold: 30000
    merge_instruction: "$prompts/conversation/merge_batches.md"
    input:
      source_depth: 1
      format: "topic_inventory"
    save_as: "step_only"
    depth: 1

  # ── Phase 6: Thread narratives → L2 nodes ──────────────────────────────
  # forEach threads from clustering output. Synthesizes each thread's
  # assigned topics (gathered from L1 nodes) into an L2 node.
  # Step type: "synth". Node ID: "L2-{index:03}".
  # Topics sorted by source_node (chronological), with order numbers added.
  # Late topics (>70% threshold) marked "[LATE — AUTHORITATIVE]".
  # Input: thread name + chronologically ordered topics array.
  # Children: list of contributing L1 node IDs.
  # Saves node with topics_json. Updates parent_id on contributing L1 nodes.
  - name: "thread_narratives"
    primitive: "synthesize"
    instruction: "$prompts/conversation/thread_narrative.md"
    for_each: "threads"
    input:
      source_step: "thread_clustering"
      user_template: "## THREAD: {thread_name}\n\n## TOPICS (chronological — higher order = later = more authoritative)\n{assigned_topics_pretty}"
      late_authority_threshold: 0.7
    save_as: "node"
    node_id_pattern: "L2-{index:03}"
    depth: 2

  # ── Phase 7: Upper layers (L3+ recursive pairing to apex) ─────────────
  # recursive_pair from depth 2 upward. Each layer pairs adjacent nodes
  # using DISTILL_PROMPT until only 1 apex node remains.
  # Node ID: "L{depth}-{index:03}".
  # Same sibling A/B input format as L1 pairing.
  # On LLM failure: retry 3 times with exponential backoff (2s, 4s, 8s),
  # then carry left node up as fallback.
  # Odd trailing node: carry up unchanged.
  # Saves node with topics_json. Updates parent_id on children.
  - name: "upper_layers"
    primitive: "synthesize"
    instruction: "$prompts/conversation/distill.md"
    recursive_pair: true
    input:
      start_depth: 2
      user_template: "## SIBLING A (earlier)\n{left_payload_pretty}\n\n## SIBLING B (later)\n{right_payload_pretty}"
    save_as: "node"
    node_id_pattern: "L{depth}-{index:03}"
    on_error: "carry_left"

post_build: []
