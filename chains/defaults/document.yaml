# Document Pipeline Chain Definition v7.0.0 — Sub-chain Architecture
#
# Pipeline:
#   1. L0 document extraction (per-doc, parallel, largest-first, auto-split)
#   2. L0 cross-doc webbing
#   3. Thread clustering (sub-chain: batch → merge, one logical step)
#   4. Thread narrative (sub-chain: batch docs within thread → merge)
#   5. L1 cross-layer webbing
#   6. Upper layers (loop: recluster → gate(apex_ready) → synthesize)
#   7. L2 cross-layer webbing
#
# Sub-chains make every pattern composable in YAML. No special-case Rust.

schema_version: 1
id: document-default
name: Document Pyramid
description: >
  Sub-chain document pipeline. Extract-first with auto-splitting for
  oversized docs. Batched clustering and thread synthesis via sub-chains
  keep every call within Mercury 2. Loop-based convergence with LLM-driven
  apex_ready signal. All execution patterns expressed in YAML.
content_type: document
version: "7.0.0"
author: agent-wire

defaults:
  model_tier: mid
  temperature: 0.3
  on_error: "retry(2)"

steps:
  # ── Step 1: L0 document extraction ─────────────────────────────────
  # Per-doc analysis, largest files dispatched first. Oversized docs
  # auto-split by sections and merged back into one L0 node.
  - name: l0_doc_extract
    primitive: extract
    instruction: "$prompts/document/doc_extract.md"
    for_each: $chunks
    dispatch_order: "largest_first"
    concurrency: 12
    node_id_pattern: "D-L0-{index:03}"
    depth: 0
    save_as: node
    max_input_tokens: 80000
    split_strategy: "sections"
    split_overlap_tokens: 500
    split_merge: true
    split_merge_instruction: "$prompts/shared/merge_sub_chunks.md"
    # No response_schema — structured output makes Mercury 2 30-60x slower
    # (67-90s per doc vs 1-3s). Free-form JSON + walker parse is faster.
    model_tier: mid
    temperature: 0.3
    on_error: "retry(3)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"

  # ── Step 2: L0 cross-doc webbing ───────────────────────────────────
  - name: l0_webbing
    primitive: web
    instruction: "$prompts/document/doc_web.md"
    input:
      nodes: $l0_doc_extract
    response_schema:
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
                description: "Exact D-L0-XXX node ID"
              target:
                type: string
                description: "Exact D-L0-XXX node ID"
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 0
    save_as: web_edges
    compact_inputs: true
    model_tier: mid
    temperature: 0.2
    on_error: "skip"

  # ── Step 3: Thread clustering (sub-chain: batch → merge) ───────────
  # One logical step. Inner sub-chain batches L0 extractions into
  # token-aware groups, clusters each, then merges into final threads.
  - name: thread_clustering
    primitive: container
    steps:
      - name: batch_cluster
        primitive: classify
        instruction: "$prompts/document/doc_cluster.md"
        for_each: $l0_doc_extract
        dehydrate:
          - drop: "topics.current"
          - drop: "topics.entities"
          - drop: "topics.summary"
          - drop: "topics"
          - drop: "orientation"
        batch_size: 150
        batch_max_tokens: 50000
        concurrency: 3
        response_schema:
          type: object
          properties:
            threads:
              type: array
              minItems: 1
              items:
                type: object
                properties:
                  name:
                    type: string
                  description:
                    type: string
                  assignments:
                    type: array
                    minItems: 1
                    items:
                      type: object
                      properties:
                        source_node:
                          type: string
                          description: "D-L0-XXX node ID"
                      required: ["source_node"]
                      additionalProperties: false
                required: ["name", "description", "assignments"]
                additionalProperties: false
          required: ["threads"]
          additionalProperties: false
        model_tier: mid
        temperature: 0.3
        on_error: "retry(3)"
        on_parse_error: "heal"
        heal_instruction: "$prompts/shared/heal_json.md"
      - name: merge_clusters
        primitive: classify
        instruction: "$prompts/document/doc_cluster_merge.md"
        input:
          batch_results: $batch_cluster
        response_schema:
          type: object
          properties:
            threads:
              type: array
              minItems: 1
              items:
                type: object
                properties:
                  name:
                    type: string
                  description:
                    type: string
                  assignments:
                    type: array
                    minItems: 1
                    items:
                      type: object
                      properties:
                        source_node:
                          type: string
                          description: "D-L0-XXX node ID"
                      required: ["source_node"]
                      additionalProperties: false
                required: ["name", "description", "assignments"]
                additionalProperties: false
          required: ["threads"]
          additionalProperties: false
        model_tier: mid
        temperature: 0.3
        on_error: "retry(3)"
        on_parse_error: "heal"
        heal_instruction: "$prompts/shared/heal_json.md"

  # ── Step 4: Thread narrative synthesis ─────────────────────────────
  # Per-thread: synthesize assigned L0 docs into one authoritative node.
  # The executor loads L0 nodes by their assignment IDs from the thread.
  - name: thread_narrative
    primitive: synthesize
    instruction: "$prompts/document/doc_thread.md"
    for_each: $thread_clustering.threads
    concurrency: 5
    node_id_pattern: "L1-{index:03}"
    depth: 1
    save_as: node
    model_tier: mid
    temperature: 0.3
    on_error: "retry(2)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"

  # ── Step 5: L1 cross-layer webbing ─────────────────────────────────
  - name: l1_webbing
    primitive: web
    instruction: "$prompts/document/doc_web.md"
    input:
      nodes: $thread_narrative
    response_schema:
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 1
    save_as: web_edges
    model_tier: mid
    temperature: 0.2
    on_error: "skip"

  # ── Step 6: Upper layers (recursive clustering → apex) ─────────────
  # Uses recursive_cluster until the loop primitive supports depth-aware
  # node loading ($current_nodes). The apex_ready signal and convergence
  # controls are still YAML-driven via cluster_response_schema.
  - name: upper_layer_synthesis
    primitive: synthesize
    instruction: "$prompts/document/doc_distill.md"
    recursive_cluster: true
    cluster_instruction: "$prompts/document/doc_recluster.md"
    cluster_item_fields: ["node_id", "headline", "orientation"]
    cluster_response_schema:
      type: object
      properties:
        apex_ready:
          type: boolean
          description: "true if nodes are the natural top-level dimensions"
        clusters:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              node_ids:
                type: array
                items:
                  type: string
            required: ["name", "description", "node_ids"]
            additionalProperties: false
      required: ["apex_ready", "clusters"]
      additionalProperties: false
    direct_synthesis_threshold: null
    convergence_fallback: "retry"
    cluster_on_error: "retry(3)"
    cluster_fallback_size: 3
    depth: 1
    save_as: node
    node_id_pattern: "L{depth}-{index:03}"
    model_tier: mid
    temperature: 0.3
    on_error: "retry(3)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"

  # ── Step 7: L2 cross-layer webbing ─────────────────────────────────
  - name: l2_webbing
    primitive: web
    instruction: "$prompts/document/doc_web.md"
    response_schema:
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 2
    save_as: web_edges
    model_tier: mid
    temperature: 0.2
    on_error: "skip"

post_build: []
