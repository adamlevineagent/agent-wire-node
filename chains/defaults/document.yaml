# Document Pipeline Chain Definition — Semantic Grouping
#
# Pipeline:
#   1. L0 document extraction (per-document LLM analysis)
#   2. Thread clustering (LLM groups ALL L0 topics into semantic threads)
#   3. Thread narrative synthesis (per-thread LLM synthesis into L1 nodes)
#   4. L1 cross-layer webbing
#   5. Upper layers (recursive clustering L1 → apex)
#   6. L2 cross-layer webbing
#
# Handles any document type: technical docs, design docs, meeting notes,
# research papers, creative writing, audit reports, etc.

schema_version: 1
id: document-default
name: Document Pyramid
description: >
  Document analysis pipeline with semantic grouping: per-document extraction,
  LLM-based thread clustering, per-thread narrative synthesis, cross-layer
  webbing, then recursive clustering to apex.
content_type: document
version: "2.0.0"
author: agent-wire

defaults:
  model_tier: mid
  temperature: 0.3
  on_error: "retry(2)"

steps:
  # ── Step 1: L0 document extraction ──────────────────────────────────
  # Per-document LLM analysis producing one node per document/chunk.
  # Detects document type (technical, design, narrative, audit, etc.)
  # and extracts accordingly.
  - name: l0_doc_extract
    primitive: extract
    instruction: "$prompts/document/doc_extract.md"
    for_each: $chunks
    node_id_pattern: "D-L0-{index:03}"
    depth: 0
    save_as: node
    concurrency: 8
    model_tier: mid
    temperature: 0.3
    on_error: "retry(3)"

  # ── Step 2: Thread clustering ───────────────────────────────────────
  # Groups ALL L0 document topics into 6-14 semantic threads.
  # Uses qwen (1M context) because the topic inventory can be large.
  - name: thread_clustering
    primitive: classify
    instruction: "$prompts/document/doc_cluster.md"
    input:
      topics: $l0_doc_extract
    response_schema:
      type: object
      properties:
        threads:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              name:
                type: string
                description: "2-6 word thread label"
              description:
                type: string
                description: "1-2 sentence description of what this thread covers"
              assignments:
                type: array
                minItems: 1
                items:
                  type: object
                  properties:
                    source_node:
                      type: string
                      description: "Exact D-L0-XXX node ID from input"
                    topic_index:
                      type: integer
                    topic_name:
                      type: string
                  required: ["source_node", "topic_index", "topic_name"]
                  additionalProperties: false
            required: ["name", "description", "assignments"]
            additionalProperties: false
      required: ["threads"]
      additionalProperties: false
    model: "qwen/qwen3.5-flash-02-23"
    temperature: 0.3
    on_error: "retry(3)"

  # ── Step 3: Thread narrative synthesis ───────────────────────────────
  # For each thread, synthesize assigned documents into a rich L1 node.
  # No structured output — free-form JSON produces richer content.
  - name: thread_narrative
    primitive: synthesize
    instruction: "$prompts/document/doc_thread.md"
    for_each: $thread_clustering.threads
    node_id_pattern: "L1-{index:03}"
    depth: 1
    save_as: node
    concurrency: 5
    model_tier: mid
    temperature: 0.3
    on_error: "retry(2)"

  # ── Step 4: L1 cross-layer webbing ──────────────────────────────────
  - name: l1_webbing
    primitive: web
    instruction: "$prompts/document/doc_web.md"
    input:
      nodes: $thread_narrative
    response_schema:
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
                description: "Exact sibling node ID (e.g., L1-000)"
              target:
                type: string
                description: "Exact sibling node ID (e.g., L1-003)"
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 1
    save_as: web_edges
    model_tier: mid
    temperature: 0.2
    on_error: "skip"

  # ── Step 5: Upper layers (recursive clustering L1 → apex) ──────────
  - name: upper_layer_synthesis
    primitive: synthesize
    instruction: "$prompts/document/doc_distill.md"
    recursive_cluster: true
    cluster_instruction: "$prompts/document/doc_recluster.md"
    cluster_model: "qwen/qwen3.5-flash-02-23"
    cluster_response_schema:
      type: object
      properties:
        clusters:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: "2-6 word cluster label — must be unique"
              description:
                type: string
              node_ids:
                type: array
                items:
                  type: string
            required: ["name", "description", "node_ids"]
            additionalProperties: false
      required: ["clusters"]
      additionalProperties: false
    depth: 1
    save_as: node
    node_id_pattern: "L{depth}-{index:03}"
    model_tier: mid
    temperature: 0.3
    on_error: "retry(3)"

  # ── Step 6: L2 cross-layer webbing ──────────────────────────────────
  - name: l2_webbing
    primitive: web
    instruction: "$prompts/document/doc_web.md"
    response_schema:
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 2
    save_as: web_edges
    model_tier: mid
    temperature: 0.2
    on_error: "skip"

post_build: []
