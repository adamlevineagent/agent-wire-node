# Document Pipeline Chain Definition v7.0.0 — Sub-chain Architecture
#
# Pipeline:
#   1. L0 document extraction (per-doc, parallel, largest-first, auto-split)
#   2. L0 cross-doc webbing
#   3. Thread clustering (sub-chain: batch → merge, one logical step)
#   4. Thread narrative (sub-chain: batch docs within thread → merge)
#   5. L1 cross-layer webbing
#   6. Upper layers (loop: recluster → gate(apex_ready) → synthesize)
#   7. L2 cross-layer webbing
#
# Sub-chains make every pattern composable in YAML. No special-case Rust.

schema_version: 1
id: document-default
name: Document Pyramid
description: >
  Sub-chain document pipeline. Extract-first with auto-splitting for
  oversized docs. Batched clustering and thread synthesis via sub-chains
  keep every call within Mercury 2. Loop-based convergence with LLM-driven
  apex_ready signal. All execution patterns expressed in YAML.
content_type: document
version: "7.0.0"
author: agent-wire

defaults:
  model_tier: mid
  temperature: 0.3
  on_error: "retry(2)"

steps:
  # ── Step 1: L0 document extraction ─────────────────────────────────
  # Per-doc analysis, largest files dispatched first. Oversized docs
  # auto-split by sections and merged back into one L0 node.
  - name: l0_doc_extract
    primitive: extract
    instruction: "$prompts/document/doc_extract.md"
    for_each: $chunks
    dispatch_order: "largest_first"
    concurrency: 12
    node_id_pattern: "D-L0-{index:03}"
    depth: 0
    save_as: node
    max_input_tokens: 80000
    split_strategy: "sections"
    split_overlap_tokens: 500
    split_merge: true
    split_merge_instruction: "$prompts/shared/merge_sub_chunks.md"
    model_tier: mid
    temperature: 0.3
    on_error: "retry(3)"

  # ── Step 2: L0 cross-doc webbing ───────────────────────────────────
  - name: l0_webbing
    primitive: web
    instruction: "$prompts/document/doc_web.md"
    input:
      nodes: $l0_doc_extract
    response_schema:
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
                description: "Exact D-L0-XXX node ID"
              target:
                type: string
                description: "Exact D-L0-XXX node ID"
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 0
    save_as: web_edges
    compact_inputs: true
    model_tier: mid
    temperature: 0.2
    on_error: "skip"

  # ── Step 3: Thread clustering (sub-chain: batch → merge) ───────────
  # One logical step. Inner sub-chain batches L0 extractions into
  # token-aware groups, clusters each, then merges into final threads.
  - name: thread_clustering
    primitive: container
    steps:
      - name: batch_cluster
        primitive: classify
        instruction: "$prompts/document/doc_cluster.md"
        for_each: $l0_doc_extract
        item_fields: ["node_id", "headline", "orientation", "topics.name"]
        batch_size: 150
        batch_max_tokens: 80000
        concurrency: 3
        response_schema:
          type: object
          properties:
            threads:
              type: array
              minItems: 1
              items:
                type: object
                properties:
                  name:
                    type: string
                    description: "2-6 word thread label based on concept"
                  description:
                    type: string
                  concept_tags:
                    type: array
                    items:
                      type: string
                  assignments:
                    type: array
                    minItems: 1
                    items:
                      type: object
                      properties:
                        source_node:
                          type: string
                          description: "Exact D-L0-XXX node ID"
                        topic_index:
                          type: integer
                        topic_name:
                          type: string
                      required: ["source_node", "topic_index", "topic_name"]
                      additionalProperties: false
                required: ["name", "description", "assignments"]
                additionalProperties: false
            unassigned:
              type: array
              items:
                type: string
          required: ["threads"]
          additionalProperties: false
        model_tier: mid
        temperature: 0.3
        on_error: "retry(3)"
      - name: merge_clusters
        primitive: classify
        instruction: "$prompts/document/doc_cluster_merge.md"
        input:
          batch_results: $batch_cluster
        response_schema:
          type: object
          properties:
            threads:
              type: array
              minItems: 1
              items:
                type: object
                properties:
                  name:
                    type: string
                  description:
                    type: string
                  concept_tags:
                    type: array
                    items:
                      type: string
                  assignments:
                    type: array
                    minItems: 1
                    items:
                      type: object
                      properties:
                        source_node:
                          type: string
                        topic_index:
                          type: integer
                        topic_name:
                          type: string
                      required: ["source_node", "topic_index", "topic_name"]
                      additionalProperties: false
                required: ["name", "description", "assignments"]
                additionalProperties: false
            unassigned:
              type: array
              items:
                type: string
          required: ["threads"]
          additionalProperties: false
        model_tier: mid
        temperature: 0.3
        on_error: "retry(3)"

  # ── Step 4: Thread narrative (sub-chain: batch docs → merge) ───────
  # Per-thread synthesis. If a thread's assigned docs exceed Mercury 2's
  # context, the sub-chain batches them and merges the partial syntheses.
  - name: thread_narrative
    primitive: container
    for_each: $thread_clustering.threads
    concurrency: 5
    node_id_pattern: "L1-{index:03}"
    depth: 1
    save_as: node
    steps:
      - name: batch_synthesize
        primitive: synthesize
        instruction: "$prompts/document/doc_thread.md"
        for_each: $item.assigned_docs
        batch_max_tokens: 60000
        concurrency: 3
        model_tier: mid
        temperature: 0.3
        on_error: "retry(2)"
      - name: merge_thread
        primitive: synthesize
        instruction: "$prompts/document/doc_thread_merge.md"
        input:
          parts: $batch_synthesize
        when: "count($batch_synthesize) > 1"
        model_tier: mid
        temperature: 0.3
        on_error: "retry(2)"

  # ── Step 5: L1 cross-layer webbing ─────────────────────────────────
  - name: l1_webbing
    primitive: web
    instruction: "$prompts/document/doc_web.md"
    input:
      nodes: $thread_narrative
    response_schema:
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 1
    save_as: web_edges
    model_tier: mid
    temperature: 0.2
    on_error: "skip"

  # ── Step 6: Upper layers (loop: recluster → apex check → synthesize) ─
  # Replaces recursive_cluster with an explicit YAML loop.
  # Each iteration: cluster current nodes, check apex_ready, synthesize.
  # Loop exits when LLM signals apex_ready or only 1 node remains.
  - name: upper_layers
    primitive: loop
    until: "count($current_nodes) <= 1"
    depth: 1
    save_as: node
    node_id_pattern: "L{depth}-{index:03}"
    steps:
      - name: recluster
        primitive: classify
        instruction: "$prompts/document/doc_recluster.md"
        input:
          nodes: $current_nodes
        item_fields: ["node_id", "headline", "orientation"]
        response_schema:
          type: object
          properties:
            apex_ready:
              type: boolean
              description: "true if nodes are the natural top-level dimensions"
            clusters:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  description:
                    type: string
                  node_ids:
                    type: array
                    items:
                      type: string
                required: ["name", "description", "node_ids"]
                additionalProperties: false
          required: ["apex_ready", "clusters"]
          additionalProperties: false
        model_tier: mid
        temperature: 0.3
        on_error: "retry(3)"
      - name: check_apex
        primitive: gate
        when: "$recluster.apex_ready == true"
        break: true
      - name: synthesize_layer
        primitive: synthesize
        instruction: "$prompts/document/doc_distill.md"
        for_each: $recluster.clusters
        concurrency: 5
        save_as: node
        node_id_pattern: "L{depth}-{index:03}"
        model_tier: mid
        temperature: 0.3
        on_error: "retry(3)"

  # ── Step 7: L2 cross-layer webbing ─────────────────────────────────
  - name: l2_webbing
    primitive: web
    instruction: "$prompts/document/doc_web.md"
    response_schema:
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 2
    save_as: web_edges
    model_tier: mid
    temperature: 0.2
    on_error: "skip"

post_build: []
