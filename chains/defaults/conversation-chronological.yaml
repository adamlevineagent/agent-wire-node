schema_version: 1
id: conversation-chronological
name: "Conversation — Chronological L0 + Question Pipeline"
description: "Question pipeline with L0 extraction expanded into forward + reverse + combine multi-pass for chronological conversation sources."
content_type: conversation
version: "1.0.0"
author: "wire-node"

defaults:
  model_tier: synth_heavy
  temperature: 0.3
  on_error: "retry(2)"

steps:
  # ── Phase 0: Load prior state ───────────────────────────────────────
  - name: load_prior_state
    primitive: cross_build_input
    save_as: step_only

  # ── Phase 1A: FORWARD pass (intermediate, step_only) ───────────────
  # Sequentially walks chunks earliest → latest. Each chunk sees a
  # rolling running_context summarizing everything earlier in the
  # session, and rewrites it to fold in the current chunk. This is the
  # "lived experience" reading.
  #
  # NO `when: l0_count == 0` gate (per chain-binding-v2.6 §9.2): if a
  # prior run crashed mid-combine, l0_count is still 0 but
  # ctx.step_outputs is empty on resume. Always re-running forward_pass
  # guarantees combine_l0 has non-empty inputs. Hash-based invalidation
  # in pyramid_pipeline_steps still short-circuits unchanged chunks.
  - name: forward_pass
    primitive: extract
    instruction: "$prompts/conversation-chronological/forward.md"
    for_each: "$chunks"
    sequential: true
    accumulate:
      running_context:
        from: "$item.output.running_context"
        init: ""
        max_chars: 4000
    input:
      chunk: "$item.content"
      chunk_index: "$item.index"
      running_context: "$running_context"
    node_id_pattern: "FWD-{index:03}"
    depth: 0
    save_as: step_only
    max_input_tokens: 80000
    split_strategy: "lines"
    split_overlap_tokens: 500
    split_merge: true
    merge_instruction: "$prompts/shared/merge_sub_chunks.md"
    on_error: "retry(3)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"
    model_tier: extractor

  # ── Phase 1B: REVERSE pass (intermediate, step_only) ───────────────
  # Sequentially walks chunks latest → earliest using for_each_reverse.
  # Each chunk sees a rolling running_context summarizing what happens
  # AFTER it. This is the hindsight reading: what turned out to matter,
  # what got revised, what dead-ended.
  #
  # Items keep their original `index` field through reversal so the
  # zip_steps lookup in combine_l0 (with reverse: true) finds the
  # correct pair, and resume keys remain stable.
  - name: reverse_pass
    primitive: extract
    instruction: "$prompts/conversation-chronological/reverse.md"
    for_each: "$chunks"
    for_each_reverse: true
    sequential: true
    accumulate:
      running_context:
        from: "$item.output.running_context"
        init: ""
        max_chars: 4000
    input:
      chunk: "$item.content"
      chunk_index: "$item.index"
      running_context: "$running_context"
    node_id_pattern: "REV-{index:03}"
    depth: 0
    save_as: step_only
    max_input_tokens: 80000
    split_strategy: "lines"
    split_overlap_tokens: 500
    split_merge: true
    merge_instruction: "$prompts/shared/merge_sub_chunks.md"
    on_error: "retry(3)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"
    model_tier: extractor

  # ── Phase 1C: COMBINE → L0 nodes (the actual L0 step) ──────────────
  # Sequential per chain-binding-v2.6 §8.3: zip_steps reads
  # ctx.current_index, which the sequential for_each loop sets per
  # iteration. Concurrent dispatch is not yet verified to propagate
  # per-task current_index, and combine is cheap relative to forward/
  # reverse, so sequential is the safe choice.
  #
  # Output schema MUST match the question pipeline L0 contract emitted
  # by chains/prompts/question/source_extract.md (headline / orientation
  # / topics[name, summary, current, entities, corrections, decisions])
  # so downstream l0_webbing, decompose, and evidence_loop can consume
  # the nodes. The combine prompt folds the chronological signals
  # (turning points, dead ends, fate, corrections) into topic fields
  # without breaking the schema.
  #
  # `when` gate IS correct on combine_l0: if L0 already exists, the
  # prior run completed combine and there's nothing to do.
  #
  # node_id_pattern matches question.yaml's source_extract pattern so
  # downstream phases find these nodes by the same naming convention.
  - name: combine_l0
    primitive: extract
    instruction: "$prompts/conversation-chronological/combine.md"
    for_each: "$chunks"
    sequential: true
    when: "$load_prior_state.l0_count == 0"
    input:
      chunk: "$item.content"
      chunk_index: "$item.index"
      zip_steps:
        - forward_pass
        - step: reverse_pass
          reverse: true
    node_id_pattern: "Q-L0-{index:03}"
    depth: 0
    save_as: node
    max_input_tokens: 120000
    split_strategy: "lines"
    split_overlap_tokens: 500
    split_merge: true
    merge_instruction: "$prompts/shared/merge_sub_chunks.md"
    on_error: "retry(3)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"
    model_tier: extractor

  # ── Phase 2: L0 webbing ────────────────────────────────────────────
  # Identical to question.yaml except input reads $combine_l0 instead
  # of $source_extract.
  - name: l0_webbing
    primitive: web
    instruction: "$prompts/question/question_web.md"
    input:
      nodes: "$combine_l0"
    max_input_tokens: 80000
    batch_size: 50
    concurrency: 4
    dehydrate:
      - drop: orientation
      - drop: topics
      - drop: entities
    compact_inputs: true
    response_schema: &web_schema
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 0
    save_as: web_edges
    model_tier: web
    temperature: 0.2
    on_error: "skip"
    when: "$load_prior_state.l0_count == 0"

  # ── Phase 3: Refresh state after extraction ─────────────────────────
  - name: refresh_state
    primitive: cross_build_input
    save_as: step_only

  # ── Phase 4: Question-driven decomposition ──────────────────────────
  - name: enhance_question
    primitive: extract
    instruction: "$prompts/question/enhance_question.md"
    input:
      apex_question: "$apex_question"
      corpus_context: "$refresh_state.l0_summary"
      characterization: "$characterize"
    max_input_tokens: 80000
    save_as: step_only

  - name: decompose
    primitive: recursive_decompose
    instruction: "$prompts/question/decompose.md"
    when: "$load_prior_state.has_overlay == false"
    input:
      apex_question: "$apex_question"
      granularity: "$granularity"
      max_depth: "$max_depth"
      characterize: "$characterize"
      audience: "$audience"
      l0_summary: "$refresh_state.l0_summary"
    max_input_tokens: 80000
    save_as: step_only

  - name: decompose_delta
    primitive: recursive_decompose
    mode: delta
    instruction: "$prompts/question/decompose_delta.md"
    when: "$load_prior_state.has_overlay == true"
    input:
      apex_question: "$apex_question"
      granularity: "$granularity"
      max_depth: "$max_depth"
      characterize: "$characterize"
      audience: "$audience"
      existing_tree: "$load_prior_state.question_tree"
      existing_answers: "$load_prior_state.overlay_answers"
      evidence_sets: "$load_prior_state.evidence_sets"
      gaps: "$load_prior_state.unresolved_gaps"
      l0_summary: "$refresh_state.l0_summary"
    max_input_tokens: 80000
    dehydrate:
      - drop: evidence_sets
      - drop: gaps
      - drop: existing_answers
    save_as: step_only

  - name: extraction_schema
    primitive: extract
    instruction: "$prompts/question/extraction_schema.md"
    input:
      question_tree: "$decomposed_tree"
      characterize: "$characterize"
      audience: "$audience"
    max_input_tokens: 80000
    save_as: step_only

  # ── Phase 4b: Build lifecycle (overlay cleanup) ─────────────────────
  - name: build_lifecycle
    primitive: build_lifecycle
    input:
      build_id: "$build_id"
      load_prior_state: "$refresh_state"
    save_as: step_only

  # ── Phase 5: Evidence answering ─────────────────────────────────────
  - name: evidence_loop
    primitive: evidence_loop
    input:
      question_tree: "$decomposed_tree"
      extraction_schema: "$extraction_schema"
      load_prior_state: "$refresh_state"
      reused_question_ids: "$reused_question_ids"
      build_id: "$build_id"
    save_as: step_only

  - name: gap_processing
    primitive: process_gaps
    input:
      evidence_loop: "$evidence_loop"
      load_prior_state: "$refresh_state"
    save_as: step_only

  # ── Phase 6: Cross-cutting webbing ──────────────────────────────────
  - name: l1_webbing
    primitive: web
    instruction: "$prompts/question/question_web.md"
    max_input_tokens: 80000
    batch_size: 50
    concurrency: 4
    dehydrate:
      - drop: orientation
      - drop: topics
      - drop: entities
    compact_inputs: true
    response_schema: *web_schema
    depth: 1
    save_as: web_edges
    model_tier: web
    temperature: 0.2
    on_error: "skip"

  - name: l2_webbing
    primitive: web
    instruction: "$prompts/question/question_web.md"
    max_input_tokens: 80000
    batch_size: 50
    concurrency: 4
    dehydrate:
      - drop: orientation
      - drop: topics
      - drop: entities
    compact_inputs: true
    response_schema: *web_schema
    depth: 2
    save_as: web_edges
    model_tier: web
    temperature: 0.2
    on_error: "skip"

post_build: []
