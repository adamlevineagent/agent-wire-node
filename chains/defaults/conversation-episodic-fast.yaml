schema_version: 1
id: conversation-episodic-fast
name: "Conversation — Episodic Memory (Fast)"
description: "Fast episodic chain: forward + reverse + combine L0, webbing, then recursive synthesis directly from L0 to apex. No question decomposition, no evidence grounding, no gap processing. Produces a structurally complete pyramid quickly; evidence can be filled on demand at query time."
content_type: conversation
version: "1.0.0"
author: "wire-node"

audience:
  role: "successor AI agent"
  description: "The successor AI agent loading this pyramid at session boot to recover working state, or the active agent hydrating nodes during in-session work. The human has biological memory and does not need this pyramid; it exists solely to give the agent continuity."
  goals:
    - "Recover current state: active work, lifecycle position, blockers"
    - "Know binding commitments from prior instances"
    - "Know rejected alternatives with reasoning, to avoid re-proposing"
    - "Know open questions and deferred items"
    - "Know human direction as authoritative, exact-worded instruction"
    - "Know prior-agent discoveries and rulings as earned priors"
  expertise: "technical"
  voice_hints:
    - "Dense and action-primed, not literary"
    - "Preserve human quotes as authoritative direction"
    - "Preserve agent commitments, discoveries, rulings as earned state"
    - "Paraphrase agent exposition into narrative prose"

defaults:
  model_tier: synth_heavy
  temperature: 0.3
  on_error: "retry(2)"

steps:
  # ── Phase 0: Load prior state ───────────────────────────────────────
  - name: load_prior_state
    primitive: cross_build_input
    save_as: step_only

  # ── Phase 1A: FORWARD pass ─────────────────────────────────────────
  - name: forward_pass
    primitive: extract
    instruction: "$prompts/conversation-episodic/forward.md"
    for_each: "$chunks"
    sequential: true
    accumulate:
      running_context:
        from: "$item.output.running_context"
        init: ""
        max_chars: 4000
    input:
      chunk: "$item.content"
      chunk_index: "$item.index"
      running_context: "$running_context"
    node_id_pattern: "FWD-{index:03}"
    depth: 0
    save_as: step_only
    max_input_tokens: 80000
    split_strategy: "lines"
    split_overlap_tokens: 500
    split_merge: true
    merge_instruction: "$prompts/shared/merge_sub_chunks.md"
    on_error: "retry(3)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"
    model_tier: extractor

  # ── Phase 1B: REVERSE pass ─────────────────────────────────────────
  - name: reverse_pass
    primitive: extract
    instruction: "$prompts/conversation-episodic/reverse.md"
    for_each: "$chunks"
    for_each_reverse: true
    sequential: true
    accumulate:
      running_context:
        from: "$item.output.running_context"
        init: ""
        max_chars: 4000
    input:
      chunk: "$item.content"
      chunk_index: "$item.index"
      running_context: "$running_context"
    node_id_pattern: "REV-{index:03}"
    depth: 0
    save_as: step_only
    max_input_tokens: 80000
    split_strategy: "lines"
    split_overlap_tokens: 500
    split_merge: true
    merge_instruction: "$prompts/shared/merge_sub_chunks.md"
    on_error: "retry(3)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"
    model_tier: extractor

  # ── Phase 1C: COMBINE → L0 nodes ──────────────────────────────────
  - name: combine_l0
    primitive: extract
    instruction: "$prompts/conversation-episodic/combine_l0.md"
    for_each: "$chunks"
    sequential: true
    when: "$load_prior_state.l0_count == 0"
    input:
      chunk: "$item.content"
      chunk_index: "$item.index"
      zip_steps:
        - forward_pass
        - step: reverse_pass
          reverse: true
    node_id_pattern: "Q-L0-{index:03}"
    depth: 0
    save_as: node
    max_input_tokens: 120000
    split_strategy: "lines"
    split_overlap_tokens: 500
    split_merge: true
    merge_instruction: "$prompts/shared/merge_sub_chunks.md"
    on_error: "retry(3)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"
    model_tier: extractor

  # ── Phase 2: L0 webbing ────────────────────────────────────────────
  - name: l0_webbing
    primitive: web
    instruction: "$prompts/question/question_web.md"
    input:
      nodes: "$combine_l0"
    max_input_tokens: 80000
    batch_size: 50
    concurrency: 4
    dehydrate:
      - drop: narrative
      - drop: key_quotes
      - drop: transitions
    compact_inputs: true
    response_schema:
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 0
    save_as: web_edges
    model_tier: web
    temperature: 0.2
    on_error: "skip"
    when: "$load_prior_state.l0_count == 0"

  # ── Phase 3: Build lifecycle (overlay cleanup) ─────────────────────
  - name: build_lifecycle
    primitive: build_lifecycle
    input:
      build_id: "$build_id"
      load_prior_state: "$refresh_state"
    save_as: step_only

  # ── Phase 4: Recursive synthesis L0 → apex ─────────────────────────
  # Pairs L0 nodes directly upward using the episodic synthesis prompt.
  # No question decomposition or evidence grounding — just structural
  # abstraction from chunk-level to session-level.
  - name: recursive_synthesis
    primitive: synthesize
    instruction: "$prompts/conversation-episodic/synthesize_recursive.md"
    recursive_pair: true
    depth: 0
    save_as: node
    node_id_pattern: "EM-L{depth}-{index:03}"
    max_input_tokens: 80000
    dehydrate:
      - drop: annotations
      - drop: transitions
      - drop: key_quotes
    model_tier: synth_heavy
    temperature: 0.3
    on_error: "retry(2)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"

  # ── Phase 5: L1+ webbing ───────────────────────────────────────────
  - name: l1_webbing
    primitive: web
    instruction: "$prompts/question/question_web.md"
    max_input_tokens: 80000
    batch_size: 50
    concurrency: 4
    dehydrate:
      - drop: narrative
      - drop: key_quotes
      - drop: transitions
    compact_inputs: true
    response_schema:
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 1
    save_as: web_edges
    model_tier: web
    temperature: 0.2
    on_error: "skip"
