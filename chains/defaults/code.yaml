# Code Pipeline Chain Definition — Simplified
#
# Pipeline sequence (mechanical steps removed — they are placeholders):
#   1. L0 code extraction (per-file LLM analysis)
#   2. L1 adjacent pairing (pairs nearby L0 nodes via distill prompt)
#   3. Upper layers (recursive adjacent pairing from L1 to apex)

schema_version: 1
id: code-default
name: Code Pyramid
description: >
  Simplified code analysis pipeline: per-file LLM extraction, then
  recursive adjacent pairing from L0 through to a single apex node.
  Mechanical clustering steps are bypassed (they are unimplemented
  placeholders in the chain dispatch).
content_type: code
version: "1.1.0"
author: agent-wire

defaults:
  model_tier: mid
  temperature: 0.3
  on_error: "retry(2)"

steps:
  # ── Step 1: L0 code extraction ────────────────────────────────────────
  # Per-file LLM analysis producing one node per source file.
  # Node IDs: "C-L0-{index:03}"
  - name: l0_code_extract
    primitive: extract
    instruction: "$prompts/code/code_extract.md"
    for_each: $chunks
    node_id_pattern: "C-L0-{index:03}"
    depth: 0
    save_as: node
    model_tier: mid
    temperature: 0.3
    on_error: skip

  # ── Step 2: Upper layers (recursive pairing L0 → apex) ───────────────
  # Starts at depth 0 (L0 code extract nodes). At each depth:
  #   - Gets all nodes at current depth
  #   - If <=1 node, that's the apex — done
  #   - Otherwise pairs adjacent nodes, synthesizes with distill prompt
  #   - Node IDs: "L{depth}-{pair_idx:03}"
  #   - On LLM failure: retries up to 3 times, then carries left node forward
  # Continues until single apex node remains.
  - name: upper_layer_synthesis
    primitive: synthesize
    instruction: "$prompts/conversation/distill.md"
    recursive_pair: true
    depth: 0
    save_as: node
    node_id_pattern: "L{depth}-{index:03}"
    model_tier: mid
    temperature: 0.3
    on_error: "retry(3)"

post_build: []
