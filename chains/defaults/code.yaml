# Code Pipeline Chain Definition v3.0.0 — Semantic Grouping
#
# Pipeline:
#   1. L0 code extraction (per-file, parallel — nodes visible immediately)
#   2. L0 cross-file webbing
#   3. Thread clustering (batched, field-projected for large codebases)
#   4. Thread narrative synthesis (per-thread)
#   5. L1 cross-layer webbing
#   6. Upper layers (recursive clustering → apex, with apex_ready signal)
#   7. L2 cross-layer webbing
#
# All intelligence in YAML and prompts. Rust is a dumb execution engine.

schema_version: 1
id: code-default
name: Code Pyramid
description: >
  Code analysis pipeline with semantic grouping: per-file extraction,
  batched thread clustering with field projection, per-thread narrative
  synthesis, and LLM-driven convergence to apex. All decisions in YAML.
content_type: code
version: "3.0.0"
author: agent-wire

defaults:
  model_tier: mid
  temperature: 0.3
  on_error: "retry(2)"

steps:
  # ── Step 1: L0 code extraction ────────────────────────────────────────
  # Per-file LLM analysis producing one node per source file.
  - name: l0_code_extract
    primitive: extract
    instruction: "$prompts/code/code_extract.md"
    instruction_map:
      type:config: "$prompts/code/config_extract.md"
      extension:.tsx: "$prompts/code/code_extract_frontend.md"
      extension:.jsx: "$prompts/code/code_extract_frontend.md"
      type:frontend: "$prompts/code/code_extract_frontend.md"
    for_each: $chunks
    dispatch_order: "largest_first"
    concurrency: 12
    node_id_pattern: "C-L0-{index:03}"
    depth: 0
    save_as: node
    # Oversized file splitting — split by line boundaries, merge back into one L0 node
    max_input_tokens: 80000
    split_strategy: "lines"
    split_overlap_tokens: 200
    split_merge: true
    split_merge_instruction: "$prompts/shared/merge_sub_chunks.md"
    model_tier: mid
    temperature: 0.3
    on_error: "retry(3)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"

  # ── Step 2: L0 cross-file webbing ──────────────────────────────────────
  - name: l0_webbing
    primitive: web
    instruction: "$prompts/code/code_web.md"
    input:
      nodes: $l0_code_extract
    response_schema:
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
                description: "Exact C-L0-XXX node ID"
              target:
                type: string
                description: "Exact C-L0-XXX node ID"
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 0
    save_as: web_edges
    compact_inputs: true
    model_tier: mid
    temperature: 0.2
    on_error: "skip"

  # ── Step 3: Thread clustering (sub-chain: batch → merge) ───────────────
  - name: thread_clustering
    primitive: container
    steps:
      - name: batch_cluster
        primitive: classify
        instruction: "$prompts/code/code_cluster.md"
        for_each: $l0_code_extract
        item_fields: ["node_id", "headline", "orientation", "topics.name,summary"]
        batch_size: 150
        batch_max_tokens: 50000
        concurrency: 3
        response_schema:
          type: object
          properties:
            threads:
              type: array
              minItems: 1
              items:
                type: object
                properties:
                  name:
                    type: string
                  description:
                    type: string
                  assignments:
                    type: array
                    minItems: 1
                    items:
                      type: object
                      properties:
                        source_node:
                          type: string
                        topic_index:
                          type: integer
                        topic_name:
                          type: string
                      required: ["source_node", "topic_index", "topic_name"]
                      additionalProperties: false
                required: ["name", "description", "assignments"]
                additionalProperties: false
          required: ["threads"]
          additionalProperties: false

        model_tier: mid
        temperature: 0.3
        on_error: "retry(3)"
        on_parse_error: "heal"
        heal_instruction: "$prompts/shared/heal_json.md"
      - name: merge_clusters
        primitive: classify
        instruction: "$prompts/code/code_cluster_merge.md"
        input:
          batch_results: $batch_cluster
        response_schema:
          type: object
          properties:
            threads:
              type: array
              minItems: 1
              items:
                type: object
                properties:
                  name:
                    type: string
                  description:
                    type: string
                  assignments:
                    type: array
                    minItems: 1
                    items:
                      type: object
                      properties:
                        source_node:
                          type: string
                        topic_index:
                          type: integer
                        topic_name:
                          type: string
                      required: ["source_node", "topic_index", "topic_name"]
                      additionalProperties: false
                required: ["name", "description", "assignments"]
                additionalProperties: false
          required: ["threads"]
          additionalProperties: false
        model_tier: mid
        temperature: 0.3
        on_error: "retry(3)"
        on_parse_error: "heal"
        heal_instruction: "$prompts/shared/heal_json.md"

  # ── Step 4: Thread narrative synthesis ─────────────────────────────────
  - name: thread_narrative
    primitive: synthesize
    instruction: "$prompts/code/code_thread.md"
    for_each: $thread_clustering.threads
    concurrency: 5
    node_id_pattern: "L1-{index:03}"
    depth: 1
    save_as: node
    model_tier: mid
    temperature: 0.3
    on_error: "retry(2)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"

  # ── Step 5: L1 cross-layer webbing ────────────────────────────────────
  - name: l1_webbing
    primitive: web
    instruction: "$prompts/code/code_web.md"
    input:
      nodes: $thread_narrative
    response_schema:
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 1
    save_as: web_edges
    model_tier: mid
    temperature: 0.2
    on_error: "skip"

  # ── Step 6: Upper layers (recursive clustering → apex) ────────────────
  - name: upper_layer_synthesis
    primitive: synthesize
    instruction: "$prompts/code/code_distill.md"
    recursive_cluster: true
    cluster_instruction: "$prompts/code/code_recluster.md"
    cluster_item_fields: ["node_id", "headline", "orientation"]
    cluster_response_schema:
      type: object
      properties:
        apex_ready:
          type: boolean
          description: "true if nodes are the natural top-level architectural domains"
        clusters:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              node_ids:
                type: array
                items:
                  type: string
            required: ["name", "description", "node_ids"]
            additionalProperties: false
      required: ["apex_ready", "clusters"]
      additionalProperties: false
    direct_synthesis_threshold: null
    convergence_fallback: "retry"
    cluster_on_error: "retry(3)"
    cluster_fallback_size: 3
    depth: 1
    save_as: node
    node_id_pattern: "L{depth}-{index:03}"
    model_tier: mid
    temperature: 0.3
    on_error: "retry(3)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"

  # ── Step 7: L2 cross-layer webbing ────────────────────────────────────
  - name: l2_webbing
    primitive: web
    instruction: "$prompts/code/code_web.md"
    response_schema:
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 2
    save_as: web_edges
    model_tier: mid
    temperature: 0.2
    on_error: "skip"

post_build: []
