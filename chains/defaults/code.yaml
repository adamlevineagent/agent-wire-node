# Code Pipeline Chain Definition — Semantic Grouping
#
# Pipeline:
#   1. L0 code extraction (per-file LLM analysis)
#   2. Thread clustering (LLM groups ALL L0 topics into 6-12 semantic threads)
#   3. Thread narrative synthesis (per-thread LLM synthesis into L1 nodes)
#   4. Upper layers (recursive adjacent pairing from L1 to apex)
#
# This produces meaningful semantic layers instead of blind 2:1 pairing.

schema_version: 1
id: code-default
name: Code Pyramid
description: >
  Code analysis pipeline with semantic grouping: per-file extraction,
  LLM-based thread clustering, per-thread narrative synthesis, then
  recursive pairing to apex.
content_type: code
version: "2.0.0"
author: agent-wire

defaults:
  model_tier: mid
  temperature: 0.3
  on_error: "retry(2)"

steps:
  # ── Step 1: L0 code extraction ────────────────────────────────────────
  # Per-file LLM analysis producing one node per source file.
  - name: l0_code_extract
    primitive: extract
    instruction: "$prompts/code/code_extract.md"
    for_each: $chunks
    node_id_pattern: "C-L0-{index:03}"
    depth: 0
    save_as: node
    model_tier: mid
    temperature: 0.3
    on_error: "retry(3)"

  # ── Step 2: Thread clustering ─────────────────────────────────────────
  # Takes ALL L0 extraction topics and groups them into 6-12 semantic
  # threads. Uses qwen (1M context) because the topic inventory can be
  # very large for big codebases.
  # Input: the full array of L0 step outputs.
  # Output: JSON with "threads" array, each containing assignments.
  - name: thread_clustering
    primitive: classify
    instruction: "$prompts/code/code_cluster.md"
    input:
      topics: $l0_code_extract
    response_schema:
      type: object
      properties:
        threads:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              name:
                type: string
                description: "2-6 word thread label"
              description:
                type: string
                description: "1-2 sentence description of the subsystem"
              assignments:
                type: array
                minItems: 1
                items:
                  type: object
                  properties:
                    source_node:
                      type: string
                      description: "Assigned L0 node ID copied EXACTLY from the input topic's node_id/source_node field (for example C-L0-005). Never put the headline text here."
                    topic_index:
                      type: integer
                      description: "Index of the topic within the topic inventory"
                    topic_name:
                      type: string
                      description: "Original headline or topic label"
                  required: ["source_node", "topic_index", "topic_name"]
                  additionalProperties: false
            required: ["name", "description", "assignments"]
            additionalProperties: false
      required: ["threads"]
      additionalProperties: false
    model: "qwen/qwen3.5-flash-02-23"
    temperature: 0.3
    on_error: "retry(3)"

  # ── Step 3: Thread narrative synthesis ─────────────────────────────────
  # For each thread from clustering, synthesize the assigned L0 topics
  # into a coherent narrative node.
  - name: thread_narrative
    primitive: synthesize
    instruction: "$prompts/code/code_thread.md"
    for_each: $thread_clustering.threads
    # No response_schema — structured outputs constrain mercury-2 and cause
    # token clipping on large threads (49K+ tokens). Free-form JSON + retry
    # is more reliable and produces richer content.
    node_id_pattern: "L1-{index:03}"
    depth: 1
    save_as: node
    model_tier: mid
    temperature: 0.3
    on_error: "retry(2)"

  # ── Step 4: Upper layers (recursive clustering L1 → apex) ────────────
  # Semantic re-clustering at each layer instead of blind 2:1 pairing.
  # Each layer: LLM groups nodes into 3-5 clusters → synthesize each cluster.
  # Produces 2-3 upper layers instead of 4-5, with better semantic structure.
  - name: upper_layer_synthesis
    primitive: synthesize
    instruction: "$prompts/code/code_distill.md"
    recursive_cluster: true
    cluster_instruction: "$prompts/code/code_recluster.md"
    cluster_model: "qwen/qwen3.5-flash-02-23"
    cluster_response_schema:
      type: object
      properties:
        clusters:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: "2-6 word cluster label — must be unique across all clusters"
              description:
                type: string
                description: "1-2 sentences on what this architectural area covers"
              node_ids:
                type: array
                items:
                  type: string
                description: "IDs of nodes in this cluster (e.g., L1-000, L1-003)"
            required: ["name", "description", "node_ids"]
            additionalProperties: false
      required: ["clusters"]
      additionalProperties: false
    depth: 1
    save_as: node
    node_id_pattern: "L{depth}-{index:03}"
    model_tier: mid
    temperature: 0.3
    on_error: "retry(3)"

post_build: []
