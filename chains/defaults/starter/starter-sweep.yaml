schema_version: 1
id: starter-sweep
name: Sweep — periodic cleanup + vocab cache refresh (Phase 9b upgrade)
description: >
  Bound to the `sweep` role. Dispatches on `sweep_tick` observation
  events emitted by pyramid_scheduler (Phase 9b-1) — one tick per
  configured period (default 6h, operator-editable via
  scheduler_parameters.sweep_interval_secs). Performs per-slug
  maintenance:

    1. chronicles the sweep (emit_sweep_invoked)
    2. counts stale-failed work items older than `stale_days`
       (observability — unchanged from 7d)
    3. archives stale-failed work items older than
       `stale_days + retention_days` (Phase 9b-3 — real mutation)
    4. retires superseded config contributions past retention
       (Phase 9b-3 — real mutation)
    5. invalidates + warms the vocab cache
    6. finalizes (passthrough log_and_complete)

  Input envelope (supplied by the scheduler caller, or by a direct
  invocation):

      {
        "slug":                         "<pyramid slug>",
        "stale_days":                   <int — sweep's age threshold
                                         for "stale failed">,
        "retention_days":               <int — extra days beyond
                                         stale_days before archival
                                         (two-stage window)>,
        "contribution_retention_days":  <int — supersession retention
                                         window in days>
      }

  All four policy knobs live in `scheduler_parameters`
  (SchedulerConfig) as editable defaults; operators who want a
  heavier or lighter sweep supersede the contribution row. Baking
  any of them into Rust is a Pillar-37-adjacent "dispatch code
  owning operator policy" violation.

  Archive semantics (Phase 9b-3): `dadbear_work_items.archived_at`
  is a new nullable column. Archival flips NULL → ISO timestamp;
  the compiler + supervisor filter on `archived_at IS NULL` so live
  queries ignore archived rows. Row IDs (semantic paths) are
  preserved — attempts + deps still resolve.
content_type: code
version: "2.0.0"
author: post-build-accretion-v5

defaults:
  model_tier: mid
  temperature: 0.3
  on_error: "retry(2)"

steps:
  - name: emit_sweep_invoked
    primitive: custom
    mechanical: true
    rust_function: emit_sweep_invoked

  - name: count_stale_failed_work_items
    primitive: custom
    mechanical: true
    rust_function: count_stale_failed_work_items

  - name: archive_stale_failed_work_items
    primitive: custom
    mechanical: true
    rust_function: archive_stale_failed_work_items

  - name: retire_superseded_contributions_past_retention
    primitive: custom
    mechanical: true
    rust_function: retire_superseded_contributions_past_retention

  - name: reindex_vocab_cache
    primitive: custom
    mechanical: true
    rust_function: reindex_vocab_cache

  - name: finalize
    primitive: custom
    mechanical: true
    rust_function: log_and_complete

post_build: []
