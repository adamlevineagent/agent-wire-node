schema_version: 1
id: starter-reconciler
name: Reconciler (v5 library chain)
description: >
  Library chain invoked via `call_starter_chain` by Phase 7 consumers
  (meta_layer_oracle, synthesizer, debate_steward) to merge overlapping
  candidate positions into a coherent set. Given N position objects, the
  LLM produces a structured `{ merged_positions, unmerged_positions,
  reasoning }` output so callers can collapse redundant positions while
  preserving genuinely distinct ones with their evidence trail.

  The `fuse` primitive is deliberate (vs. `synthesize`): fuse says "merge
  these inputs into outputs that preserve provenance" — each merged
  position carries a `merged_from` list of original labels — while
  synthesize would mean "produce a new thing from these inputs." The
  evidence trail is load-bearing here because downstream consumers rewire
  evidence_refs from merged positions onto the consolidated output.

  Input envelope (supplied by the parent step's `input` block):

      {
        "positions": [
          {
            "label": "<stable id or label>",
            "content": "<the position statement>",
            "evidence_refs": ["<ref>", ...]
          },
          ...
        ]
      }

  This chain is bound to the `reconciler` role via GENESIS_BINDINGS
  (see pyramid/role_binding.rs). Operators may supersede the binding to
  route reconciliation through a different chain per slug.
content_type: code
version: "1.0.0"
author: post-build-accretion-v5

defaults:
  model_tier: mid
  temperature: 0.3
  on_error: "retry(2)"

steps:
  - name: reconcile_positions
    primitive: fuse
    instruction: $prompts/starter/reconciler.md
    model_tier: mid
    response_schema:
      type: object
      additionalProperties: false
      required: [merged_positions, unmerged_positions, reasoning]
      properties:
        merged_positions:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [label, content, merged_from, evidence_refs]
            properties:
              label:
                type: string
              content:
                type: string
              merged_from:
                type: array
                items:
                  type: string
              evidence_refs:
                type: array
                items:
                  type: string
        unmerged_positions:
          type: array
          items:
            type: object
        reasoning:
          type: string

post_build: []
