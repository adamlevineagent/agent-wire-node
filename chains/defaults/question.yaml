schema_version: 1
id: question-pipeline
name: Question Pipeline
description: "Extract-first question-driven knowledge pyramid. Generic L0 → web → decompose → evidence → gaps."
content_type: question
version: "2.0.0"
author: "wire-node"

defaults:
  model_tier: mid
  temperature: 0.3
  on_error: "retry(2)"

steps:
  # ── Phase 0: Load prior state ───────────────────────────────────────
  - name: load_prior_state
    primitive: cross_build_input
    save_as: step_only

  # ── Phase 1: Generic L0 extraction (first question only) ───────────
  # Content-type neutral. Same dehydration-friendly schema as document
  # pipeline. Produces headline / orientation / topics[summary, current,
  # entities] — multiple summary levels for downstream dehydration.
  - name: source_extract
    primitive: extract
    instruction: "$prompts/question/source_extract.md"
    instruction_map:
      content_type:conversation: "$prompts/conversation/source_extract_v2.md"
    for_each: "$chunks"
    when: "$load_prior_state.l0_count == 0"
    dispatch_order: "largest_first"
    concurrency: 10
    node_id_pattern: "Q-L0-{index:03}"
    depth: 0
    save_as: node
    max_input_tokens: 80000
    split_strategy: "sections"
    split_overlap_tokens: 500
    split_merge: true
    merge_instruction: "$prompts/shared/merge_sub_chunks.md"
    on_error: "retry(3)"
    on_parse_error: "heal"
    heal_instruction: "$prompts/shared/heal_json.md"

  # ── Phase 2: L0 webbing (first question only) ──────────────────────
  # Build corpus structure map before decomposition. Token-aware
  # dehydration only strips fields when content exceeds the budget.
  # Web edges inform decompose about thematic boundaries in the corpus.
  - name: l0_webbing
    primitive: web
    instruction: "$prompts/question/question_web.md"
    input:
      nodes: "$source_extract"
    max_input_tokens: 80000
    batch_size: 50
    concurrency: 4
    dehydrate:
      - drop: orientation
      - drop: topics
      - drop: entities
    compact_inputs: true
    response_schema: &web_schema
      type: object
      properties:
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
              shared_resources:
                type: array
                items:
                  type: string
              strength:
                type: number
            required: ["source", "target", "relationship", "shared_resources", "strength"]
            additionalProperties: false
      required: ["edges"]
      additionalProperties: false
    depth: 0
    save_as: web_edges
    model_tier: mid
    temperature: 0.2
    on_error: "skip"
    when: "$load_prior_state.l0_count == 0"

  # ── Phase 3: Refresh state after extraction ─────────────────────────
  # Re-runs cross_build_input to pick up L0 nodes and web edges created
  # by source_extract + l0_webbing. Provides populated l0_summary for
  # enhance and decompose. Always runs (cheap DB read, not LLM call).
  - name: refresh_state
    primitive: cross_build_input
    save_as: step_only

  # ── Phase 4: Question-driven decomposition ──────────────────────────
  # Now informed by real L0 content (via refresh_state.l0_summary and
  # L0 nodes in DB). Decompose sees actual extracted content, not just
  # $characterize. Cannot ask about absent topics.

  - name: enhance_question
    primitive: extract
    instruction: "$prompts/question/enhance_question.md"
    input:
      apex_question: "$apex_question"
      corpus_context: "$refresh_state.l0_summary"
      characterization: "$characterize"
    max_input_tokens: 80000
    save_as: step_only

  - name: decompose
    primitive: recursive_decompose
    instruction: "$prompts/question/decompose.md"
    when: "$load_prior_state.has_overlay == false"
    input:
      apex_question: "$apex_question"
      granularity: "$granularity"
      max_depth: "$max_depth"
      characterize: "$characterize"
      audience: "$audience"
      l0_summary: "$refresh_state.l0_summary"
    max_input_tokens: 80000
    save_as: step_only

  - name: decompose_delta
    primitive: recursive_decompose
    mode: delta
    instruction: "$prompts/question/decompose_delta.md"
    when: "$load_prior_state.has_overlay == true"
    input:
      apex_question: "$apex_question"
      granularity: "$granularity"
      max_depth: "$max_depth"
      characterize: "$characterize"
      audience: "$audience"
      existing_tree: "$load_prior_state.question_tree"
      existing_answers: "$load_prior_state.overlay_answers"
      evidence_sets: "$load_prior_state.evidence_sets"
      gaps: "$load_prior_state.unresolved_gaps"
      l0_summary: "$refresh_state.l0_summary"
    max_input_tokens: 80000
    dehydrate:
      - drop: evidence_sets
      - drop: gaps
      - drop: existing_answers
    save_as: step_only

  # Both decompose and decompose_delta write to $decomposed_tree (canonical alias).
  # Downstream steps use $decomposed_tree so they work regardless of which path ran.

  - name: extraction_schema
    primitive: extract
    instruction: "$prompts/question/extraction_schema.md"
    input:
      question_tree: "$decomposed_tree"
      characterize: "$characterize"
      audience: "$audience"
    max_input_tokens: 80000
    save_as: step_only

  # ── Phase 5: Evidence answering ─────────────────────────────────────
  # No separate l0_extract step. evidence_loop works from generic L0
  # nodes created by source_extract. extraction_schema is used internally
  # for synthesis prompts and gap targeting.

  - name: evidence_loop
    primitive: evidence_loop
    input:
      question_tree: "$decomposed_tree"
      extraction_schema: "$extraction_schema"
      load_prior_state: "$refresh_state"
      reused_question_ids: "$reused_question_ids"
      build_id: "$build_id"
    save_as: step_only

  - name: gap_processing
    primitive: process_gaps
    input:
      evidence_loop: "$evidence_loop"
      load_prior_state: "$refresh_state"
    save_as: step_only

  # ── Phase 6: Cross-cutting webbing ──────────────────────────────────
  # Web sibling answer nodes at each depth level. Finds connections
  # the question tree hierarchy misses.

  - name: l1_webbing
    primitive: web
    instruction: "$prompts/question/question_web.md"
    max_input_tokens: 80000
    batch_size: 50
    concurrency: 4
    dehydrate:
      - drop: orientation
      - drop: topics
      - drop: entities
    compact_inputs: true
    response_schema: *web_schema
    depth: 1
    save_as: web_edges
    model_tier: mid
    temperature: 0.2
    on_error: "skip"

  - name: l2_webbing
    primitive: web
    instruction: "$prompts/question/question_web.md"
    max_input_tokens: 80000
    batch_size: 50
    concurrency: 4
    dehydrate:
      - drop: orientation
      - drop: topics
      - drop: entities
    compact_inputs: true
    response_schema: *web_schema
    depth: 2
    save_as: web_edges
    model_tier: mid
    temperature: 0.2
    on_error: "skip"

post_build: []
